# Manually triggered: open a conda-forge feedstock PR for a released WNTR version.
# Pulls and hashes the GitHub release archive directly, so this does not depend on PyPI.
# Run this after confirming the version tag exists on https://github.com/USEPA/WNTR/tags.

name: Publish to conda-forge

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.4.1) - must already be tagged on GitHub'
        required: true
        type: string

jobs:
  open-conda-forge-pr:
    name: Open conda-forge feedstock PR
    runs-on: ubuntu-latest
    steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Compute source archive sha256
      id: sha
      run: |
        curl -sL -o source.zip https://github.com/USEPA/WNTR/archive/${{ inputs.version }}.zip
        echo "sha256=$(sha256sum source.zip | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

    - name: Clone feedstock fork
      run: |
        git clone https://x-access-token:${{ secrets.CONDA_FORGE_TOKEN }}@github.com/${{ vars.CONDA_FORGE_FORK_OWNER }}/wntr-feedstock.git
        cd wntr-feedstock
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git checkout -b release-${{ inputs.version }}

    - name: Patch feedstock recipe
      env:
        VERSION: ${{ inputs.version }}
        SHA256: ${{ steps.sha.outputs.sha256 }}
      run: |
        python - <<'EOF'
        import os
        import re

        version, sha256 = os.environ["VERSION"], os.environ["SHA256"]
        path = "wntr-feedstock/recipe/meta.yaml"

        with open(path) as f:
            content = f.read()

        content = re.sub(r'({% set version = ")[^"]+(")', f'\\g<1>{version}\\2', content)
        content = re.sub(r'(sha256:\s*)\S+', f'\\g<1>{sha256}', content)
        content = re.sub(r'(number:\s*)\d+', '\\g<1>0', content)

        with open(path, 'w') as f:
            f.write(content)

        print(f"Patched {path}: version={version}, sha256={sha256}, build number=0")
        EOF

    - name: Push branch and open PR
      env:
        GH_TOKEN: ${{ secrets.CONDA_FORGE_TOKEN }}
      run: |
        cd wntr-feedstock
        git add recipe/meta.yaml
        git commit -m "Update WNTR to ${{ inputs.version }}"
        git push origin release-${{ inputs.version }}

        gh pr create \
          --repo conda-forge/wntr-feedstock \
          --head ${{ vars.CONDA_FORGE_FORK_OWNER }}:release-${{ inputs.version }} \
          --title "Update WNTR to ${{ inputs.version }}" \
          --body ""
